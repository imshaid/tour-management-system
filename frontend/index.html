<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tour Management System</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈️</text></svg>" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">✈️</div>
    <h4>Tour Management</h4>
    <small>DBMS Mini Project</small>
  </div>
  <div class="sidebar-nav mt-2">
    <span class="nav-section-label">Main</span>
    <a class="nav-link" data-page="dashboard" onclick="navigate('dashboard')">
      <i class="bi bi-speedometer2"></i> Dashboard
    </a>

    <span class="nav-section-label">Operations</span>
    <a class="nav-link" data-page="customers" onclick="navigate('customers')">
      <i class="bi bi-people"></i> Customers
    </a>
    <a class="nav-link" data-page="tourpackages" onclick="navigate('tourpackages')">
      <i class="bi bi-map"></i> Tour Packages
    </a>
    <a class="nav-link" data-page="bookings" onclick="navigate('bookings')">
      <i class="bi bi-calendar-check"></i> Bookings
    </a>
    <a class="nav-link" data-page="payments" onclick="navigate('payments')">
      <i class="bi bi-credit-card"></i> Payments
    </a>
    <a class="nav-link" data-page="reviews" onclick="navigate('reviews')">
      <i class="bi bi-star"></i> Reviews
    </a>

    <span class="nav-section-label">Resources</span>
    <a class="nav-link" data-page="tourguides" onclick="navigate('tourguides')">
      <i class="bi bi-person-badge"></i> Tour Guides
    </a>
    <a class="nav-link" data-page="locations" onclick="navigate('locations')">
      <i class="bi bi-geo-alt"></i> Locations
    </a>
    <a class="nav-link" data-page="hotels" onclick="navigate('hotels')">
      <i class="bi bi-building"></i> Hotels
    </a>

    <span class="nav-section-label">Insights</span>
    <a class="nav-link" data-page="analytics" onclick="navigate('analytics')">
      <i class="bi bi-bar-chart-line"></i> Analytics
    </a>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div id="main-content">
  <!-- TOPBAR -->
  <div id="topbar">
    <div>
      <button class="btn btn-sm d-md-none me-2" onclick="toggleSidebar()" style="border:none;background:none;font-size:20px;"><i class="bi bi-list"></i></button>
      <h5 id="page-title" class="d-inline">Dashboard</h5>
      <nav aria-label="breadcrumb" class="d-inline ms-2">
        <ol class="breadcrumb mb-0" id="breadcrumb">
          <li class="breadcrumb-item">Home</li>
          <li class="breadcrumb-item active">Dashboard</li>
        </ol>
      </nav>
    </div>
    <div class="d-flex align-items-center gap-3">
      <span class="text-muted" style="font-size:12px;" id="current-time"></span>
      <div class="avatar" style="background:#2563eb;font-size:12px;">TMS</div>
    </div>
  </div>

  <!-- PAGE CONTENT -->
  <div id="page-content">
    <div class="loading-overlay"><div class="spinner"></div><span>Loading...</span></div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<!-- CONFIRM DELETE MODAL -->
<div class="modal fade" id="confirmModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-exclamation-triangle text-danger me-2"></i>Confirm Action</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p id="confirmMessage" class="mb-0">Are you sure?</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-sm btn-danger" id="confirmBtn">Delete</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/pages/dashboard.js"></script>
<script src="assets/js/pages/customers.js"></script>
<script src="assets/js/pages/tourpackages.js"></script>
<script src="assets/js/pages/bookings.js"></script>
<script src="assets/js/pages/payments.js"></script>
<script src="assets/js/pages/reviews.js"></script>
<script src="assets/js/pages/tourguides.js"></script>
<script src="assets/js/pages/locations.js"></script>
<script src="assets/js/pages/hotels.js"></script>
<script src="assets/js/pages/analytics.js"></script>
<script>
  // ===== ROUTER =====
  const pageConfig = {
    dashboard:    { title: 'Dashboard',     breadcrumb: ['Home', 'Dashboard'],     render: renderDashboard },
    customers:    { title: 'Customers',     breadcrumb: ['Home', 'Customers'],     render: renderCustomers },
    tourpackages: { title: 'Tour Packages', breadcrumb: ['Home', 'Tour Packages'], render: renderTourPackages },
    bookings:     { title: 'Bookings',      breadcrumb: ['Home', 'Bookings'],      render: renderBookings },
    payments:     { title: 'Payments',      breadcrumb: ['Home', 'Payments'],      render: renderPayments },
    reviews:      { title: 'Reviews',       breadcrumb: ['Home', 'Reviews'],       render: renderReviews },
    tourguides:   { title: 'Tour Guides',   breadcrumb: ['Home', 'Tour Guides'],   render: renderTourGuides },
    locations:    { title: 'Locations',     breadcrumb: ['Home', 'Locations'],     render: renderLocations },
    hotels:       { title: 'Hotels',        breadcrumb: ['Home', 'Hotels'],        render: renderHotels },
    analytics:    { title: 'Analytics',     breadcrumb: ['Home', 'Analytics'],     render: renderAnalytics },
  };

  function navigate(page) {
    const cfg = pageConfig[page];
    if (!cfg) return;
    document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
    document.querySelector(`[data-page="${page}"]`)?.classList.add('active');
    document.getElementById('page-title').textContent = cfg.title;
    const bc = document.getElementById('breadcrumb');
    bc.innerHTML = cfg.breadcrumb.map((b, i) =>
      i < cfg.breadcrumb.length - 1 ? `<li class="breadcrumb-item">${b}</li>` : `<li class="breadcrumb-item active">${b}</li>`
    ).join('');
    document.getElementById('page-content').innerHTML = `<div class="loading-overlay"><div class="spinner"></div><span>Loading...</span></div>`;
    cfg.render();
    history.pushState({ page }, '', `?page=${page}`);
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
  }

  // Time update
  function updateTime() {
    document.getElementById('current-time').textContent = new Date().toLocaleTimeString('en-BD', { hour: '2-digit', minute: '2-digit' });
  }
  setInterval(updateTime, 1000); updateTime();

  // Init
  window.addEventListener('popstate', e => e.state?.page && navigate(e.state.page));
  const initPage = new URLSearchParams(location.search).get('page') || 'dashboard';
  navigate(initPage);
</script>
</body>
</html>
